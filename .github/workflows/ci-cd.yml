name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: parts_catalog
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U admin; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            sleep 1
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Initialize Database Schema
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U admin -d parts_catalog -f database/init.sql

      - name: Build and Run Tests with Maven
        run: |
          cd partscatalog-java
          mvn clean package -B
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: parts_catalog
          DB_USER: admin
          DB_PASSWORD: password

      - name: Build Docker Image
        run: |
          cd partscatalog-java
          docker build -t triad-search-service:latest .

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
