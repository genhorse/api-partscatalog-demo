# Server Settings
server.port=8080
server.host=0.0.0.0

# Database Connection - MUST start with javax.sql.DataSource
javax.sql.DataSource.triadDS.dataSourceClassName=org.postgresql.ds.PGSimpleDataSource
javax.sql.DataSource.triadDS.dataSource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:parts_catalog}
javax.sql.DataSource.triadDS.dataSource.user=${DB_USER:admin}
javax.sql.DataSource.triadDS.dataSource.password=${DB_PASSWORD:password}

# Connection Pool Settings
javax.sql.DataSource.triadDS.maximumPoolSize=10
javax.sql.DataSource.triadDS.minimumIdle=2
javax.sql.DataSource.triadDS.idleTimeout=30000
